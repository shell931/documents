# openspec/config.yaml
schema: spec-driven

context: |
  Project: report-collector
  Status: Greenfield (workspace just created — no source code yet)
  Tech stack: TBD (to be chosen during first /sdd-explore or /sdd-new)
  Architecture: TBD
  Testing: None detected — initialize after picking the stack
  Style: None detected — adopt linter/formatter once stack is chosen

# strict_tdd is false because no test runner exists yet.
# Re-run `sdd-init` after adding a test framework to flip this on.
strict_tdd: false

# Cached testing capabilities (re-detected on `sdd-init`).
testing:
  detected: 2026-04-28
  test_runner:
    available: false
    framework: null
    command: null
  layers:
    unit:
      available: false
      tool: null
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: false
      command: null
    type_checker:
      available: false
      command: null
    formatter:
      available: false
      command: null

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
